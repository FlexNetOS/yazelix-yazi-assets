schema_version = 1
assets_root = "share/yazelix_yazi_assets"
starship_config = "yazelix_starship.toml"
render_plan_metadata = "config_metadata/yazi_render_plan.toml"

# Portable layer: cross-platform Yazi flavor, plugin, and configuration assets
# only. Foundation runtime tools (ccboard, CodeDB) are a Linux-only concern
# because CodeDB owns an upstream Bubblewrap sandbox that is never emulated on
# Darwin. Their availability is modeled explicitly by the separate
# `yazi_runtime_tools_manifest.toml`, which is present only in the Linux
# `yazelix_yazi_assets` composition. The portable layer therefore makes no
# runtime-tool claims.
runtime_tools_available = false

config_templates = [
  "yazelix_keymap.toml",
  "yazelix_theme.toml",
  "yazelix_yazi.toml",
]

plugins = [
  "auto-layout.yazi",
  "git.yazi",
  "lazygit.yazi",
  "smart-tabs.yazi",
  "starship.yazi",
]

flavors = [
  "ashen.yazi",
  "ayu-dark.yazi",
  "bluloco-dark.yazi",
  "bluloco-light.yazi",
  "catppuccin-frappe.yazi",
  "catppuccin-latte.yazi",
  "catppuccin-macchiato.yazi",
  "catppuccin-mocha.yazi",
  "dracula.yazi",
  "everforest-medium.yazi",
  "flexoki-dark.yazi",
  "flexoki-light.yazi",
  "gruvbox-dark.yazi",
  "kanagawa-dragon.yazi",
  "kanagawa-lotus.yazi",
  "kanagawa.yazi",
  "monokai.yazi",
  "neon.yazi",
  "nord.yazi",
  "rose-pine-dawn.yazi",
  "rose-pine-moon.yazi",
  "rose-pine.yazi",
  "synthwave84.yazi",
  "tokyo-night.yazi",
]
