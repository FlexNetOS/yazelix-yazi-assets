schema_version = 1
assets_root = "share/yazelix_yazi_assets"
starship_config = "yazelix_starship.toml"
render_plan_metadata = "config_metadata/yazi_render_plan.toml"

config_templates = [
  "yazelix_keymap.toml",
  "yazelix_theme.toml",
  "yazelix_yazi.toml",
]

plugins = [
  "auto-layout.yazi",
  "git.yazi",
  "lazygit.yazi",
  "smart-tabs.yazi",
  "starship.yazi",
]

runtime_tools = [
  "ccboard",
  "codedb",
]

flavors = [
  "ashen.yazi",
  "ayu-dark.yazi",
  "bluloco-dark.yazi",
  "bluloco-light.yazi",
  "catppuccin-frappe.yazi",
  "catppuccin-latte.yazi",
  "catppuccin-macchiato.yazi",
  "catppuccin-mocha.yazi",
  "dracula.yazi",
  "everforest-medium.yazi",
  "flexoki-dark.yazi",
  "flexoki-light.yazi",
  "gruvbox-dark.yazi",
  "kanagawa-dragon.yazi",
  "kanagawa-lotus.yazi",
  "kanagawa.yazi",
  "monokai.yazi",
  "neon.yazi",
  "nord.yazi",
  "rose-pine-dawn.yazi",
  "rose-pine-moon.yazi",
  "rose-pine.yazi",
  "synthwave84.yazi",
  "tokyo-night.yazi",
]

[runtime_tool_paths.ccboard]
root = "runtime_tools/ccboard"
metadata = "runtime_tools/ccboard/runtime-tool-metadata.json"
manifest = "config_metadata/ccboard_runtime_tool.toml"
commands = [
  "runtime_tools/ccboard/bin/ccboard",
]

[runtime_tool_paths.codedb]
root = "runtime_tools/codedb"
metadata = "runtime_tools/codedb/runtime-tool-metadata.json"
manifest = "config_metadata/codedb_runtime_tool.toml"
commands = [
  "runtime_tools/codedb/bin/codedb",
  "runtime_tools/codedb/bin/nu_plugin_codedb",
]
