[[mgr.prepend_keymap]]
on = [ "g", "l" ]
run = "plugin lazygit"
desc = "Open lazygit"

[[mgr.prepend_keymap]]
on = [ "t", "t" ]
run = "plugin smart-tabs create"
desc = "Create tab from hovered directory"

[[mgr.prepend_keymap]]
on = "1"
run = "plugin smart-tabs switch 0"
desc = "Switch or create tab 1"

[[mgr.prepend_keymap]]
on = "2"
run = "plugin smart-tabs switch 1"
desc = "Switch or create tab 2"

[[mgr.prepend_keymap]]
on = "3"
run = "plugin smart-tabs switch 2"
desc = "Switch or create tab 3"

[[mgr.prepend_keymap]]
on = "4"
run = "plugin smart-tabs switch 3"
desc = "Switch or create tab 4"

[[mgr.prepend_keymap]]
on = "5"
run = "plugin smart-tabs switch 4"
desc = "Switch or create tab 5"

[[mgr.prepend_keymap]]
on = "6"
run = "plugin smart-tabs switch 5"
desc = "Switch or create tab 6"

[[mgr.prepend_keymap]]
on = "7"
run = "plugin smart-tabs switch 6"
desc = "Switch or create tab 7"

[[mgr.prepend_keymap]]
on = "8"
run = "plugin smart-tabs switch 7"
desc = "Switch or create tab 8"

[[mgr.prepend_keymap]]
on = "9"
run = "plugin smart-tabs switch 8"
desc = "Switch or create tab 9"

[[mgr.prepend_keymap]]
on = "0"
run = "plugin smart-tabs switch 9"
desc = "Switch or create tab 10"
